    <script>
        // --- Dark Mode Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        // Check initial theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        // Toggle theme listener
        themeToggleBtn.addEventListener('click', function() {
            // Toggle icons
            sunIcon.classList.toggle('hidden');
            moonIcon.classList.toggle('hidden');

            // Toggle document class & save preference
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // --- Mock Login Redirect Logic ---
        function simulateLoginRedirect() {
            const toast = document.getElementById('toast');
            
            // Show toast
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            // Hide toast after a few seconds (Simulating the redirect delay)
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
        // Save checkbox state when changed
    function handleRememberMe() {
        const checkbox = document.getElementById("remember");
        localStorage.setItem("rememberMe", checkbox.checked);
    }

    // Load saved state when page loads
    function loadRememberMe() {
        const savedState = localStorage.getItem("rememberMe");
        if (savedState === "true") {
            document.getElementById("remember").checked = true;
        }
    }

    // Run when page loads
    window.onload = loadRememberMe;
