<!-- Footer -->
    <footer class="bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-900 py-12 relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2 text-slate-800 dark:text-slate-200">
                <svg class="w-6 h-6 text-primary-600 dark:text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="font-bold text-lg">Trustify</span>
                <span class="text-slate-400 dark:text-slate-500 font-normal ml-2">&copy; 2024 All rights reserved.</span>
            </div>
            <div class="flex gap-8 text-sm font-medium text-slate-500 dark:text-slate-400">
                <a href="#" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">Privacy Policy</a>
                <a href="#" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">Terms of Service</a>
                <a href="#" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">Contact Support</a>
            </div>
        </div>
    </footer>

    <!-- Login Modal (Hidden by default) -->
    <div id="loginModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/40 dark:bg-slate-950/80 backdrop-blur-sm transition-opacity opacity-0" id="modalBackdrop" onclick="closeLoginModal()"></div>

        <!-- Modal Content -->
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2rem] shadow-2xl relative z-10 scale-95 opacity-0 transition-all duration-300 border border-slate-100 dark:border-slate-800 p-8 sm:p-10" id="modalContent">
            <!-- Close button -->
            <button onclick="closeLoginModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors bg-slate-100 dark:bg-slate-800 rounded-full p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Welcome Back</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Enter your credentials to access your portal</p>
            </div>

            <form id="loginForm" onsubmit="handleLoginSubmit(event)" class="space-y-5" novalidate>
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com"
                        class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 dark:focus:ring-primary-500/50 text-slate-900 dark:text-white placeholder-slate-400 transition-all">
                    <p id="emailError" class="text-red-500 text-xs mt-1.5 ml-1 hidden">Please enter a valid email address.</p>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary-500/50 dark:focus:ring-primary-500/50 text-slate-900 dark:text-white placeholder-slate-400 transition-all pr-12">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <p id="passwordError" class="text-red-500 text-xs mt-1.5 ml-1 hidden">Password must be at least 6 characters.</p>
                </div>

                <!-- Remember & Forgot -->
                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="remember" onchange="handleRememberMe()" class="peer sr-only">
                            <div class="w-5 h-5 rounded border-2 border-slate-300 dark:border-slate-600 peer-checked:bg-primary-600 peer-checked:border-primary-600 transition-colors flex items-center justify-center group-hover:border-primary-500">
                                <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                        </div>
                        <span class="text-sm text-slate-600 dark:text-slate-400 select-none">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-medium text-primary-600 dark:text-primary-400 hover:underline">Forgot password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-slate-900 dark:bg-primary-600 hover:bg-slate-800 dark:hover:bg-primary-500 text-white py-3.5 rounded-2xl font-semibold shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 dark:focus:ring-offset-slate-900 transition-all active:scale-[0.98] mt-4">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-[110] transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-4 rounded-2xl shadow-2xl pointer-events-none">
        <div class="bg-green-500/20 text-green-400 dark:text-green-600 p-1.5 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span class="font-medium">Login successful! Redirecting...</span>
    </div>

    <!-- Scripts -->
    <script>
        // --- Dark Mode Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            sunIcon.classList.toggle('hidden');
            moonIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // --- Modal Control Logic ---
        const modal = document.getElementById('loginModal');
        const backdrop = document.getElementById('modalBackdrop');
        const content = document.getElementById('modalContent');

        function openLoginModal() {
            modal.classList.remove('hidden');
            // Slight delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                backdrop.classList.add('opacity-100');
                content.classList.remove('opacity-0', 'scale-95');
                content.classList.add('opacity-100', 'scale-100');
            }, 10);
            loadRememberMe(); // Load existing state when opened
        }

        function closeLoginModal() {
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0');
            content.classList.remove('opacity-100', 'scale-100');
            content.classList.add('opacity-0', 'scale-95');

            // Wait for transition to finish
            setTimeout(() => {
                modal.classList.add('hidden');
                // Reset form errors
                document.getElementById('emailError').classList.add('hidden');
                document.getElementById('passwordError').classList.add('hidden');
                document.getElementById('loginForm').reset();
            }, 300);
        }

        // --- Original & Validation Logic ---

        function handleLoginSubmit(event) {
            event.preventDefault(); // Prevent page reload

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            let isValid = true;

            // Basic Email Validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value)) {
                emailError.classList.remove('hidden');
                emailInput.classList.add('border-red-500', 'dark:border-red-500');
                isValid = false;
            } else {
                emailError.classList.add('hidden');
                emailInput.classList.remove('border-red-500', 'dark:border-red-500');
            }

            // Basic Password Validation
            if (passwordInput.value.length < 6) {
                passwordError.classList.remove('hidden');
                passwordInput.classList.add('border-red-500', 'dark:border-red-500');
                isValid = false;
            } else {
                passwordError.classList.add('hidden');
                passwordInput.classList.remove('border-red-500', 'dark:border-red-500');
            }

            if (isValid) {
                closeLoginModal();
                simulateLoginRedirect();
            }
        }

        function simulateLoginRedirect() {
            const toast = document.getElementById('toast');

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function handleRememberMe() {
            const checkbox = document.getElementById("remember");
            localStorage.setItem("rememberMe", checkbox.checked);
        }

        function loadRememberMe() {
            const savedState = localStorage.getItem("rememberMe");
            if (savedState === "true") {
                document.getElementById("remember").checked = true;
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                `;
            } else {
                passwordInput.type = "password";
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                `;
            }
        }

        // Run when page loads
        window.onload = loadRememberMe;
    </script>
</body>
</html>
