{% include 'admin_header.html' %}


<style>
    /* scrollable table wrapper */
.table-scroll{
  width:100%;
  overflow-x:auto;
  overflow-y:auto;
  max-height:520px;               /* vertical scroll after this height */
  border-radius:10px;
  border:1px solid var(--b1);
}

/* sticky header while table scrolls */
.table-scroll thead th{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--card2, #f5f5f7);
}

</style>
<div class="table-wrap">
        <div class="tw-header">
         <span class="tw-title">All Feedbacks</span>
        </div>
 <div class="table-scroll">
    <table class="table table-bordered text-center w-75">
        <thead>
        <tr>
            <th>#</th>
             <th>photo</th>
            <th>first name</th>
            <th>last name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Place</th>

        </tr>
        </thead>
        <tbody>
        {% for i in U %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>
                    <img src="{{ i.photo.url }}" width="80" height="80" style="border-radius:50%;">
                </td>
                <td>{{ i.first_name }}</td>
                <td>{{ i.last_name }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.email }}</td>
                <td>{{ i.place }}</td>


            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</div>
{% include 'admin_footer.html' %}
