{% include 'admin_header.html' %}


<br>
<br>
<br>
<br>
<div class="table-wrap">
    <div class="tw-header">
        <span class="tw-title">All Users</span>
    </div>
    <table class="table table-bordered text-center w-75">
        <thead>
        <tr>
            <th>#</th>
             <th>photo</th>
            <th>first name</th>
            <th>last name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Place</th>

        </tr>
        </thead>
        <tbody>
        {% for i in U %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>
                    <img src="{{ i.photo.url }}" width="80" height="80" style="border-radius:50%;">
                </td>
                <td>{{ i.first_name }}</td>
                <td>{{ i.last_name }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.email }}</td>
                <td>{{ i.place }}</td>


            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% include 'admin_footer.html' %}
