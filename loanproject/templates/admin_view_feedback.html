{% include 'admin_header.html' %}

<style>
    /* scrollable table wrapper */
.table-scroll{
  width:100%;
  overflow-x:auto;
  overflow-y:auto;
  max-height:520px;               /* vertical scroll after this height */
  border-radius:10px;
  border:1px solid var(--b1);
}

/* sticky header while table scrolls */
.table-scroll thead th{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--card2, #f5f5f7);
}

</style>
<div class="table-wrap">
        <div class="tw-header">
         <span class="tw-title">All Feedbacks</span>
        </div>
 <div class="table-scroll">
    <table class="table table-bordered text-center w-75">
    <thead>
      <tr>
        <th>SL.no</th>
        <th>Message</th>
        <th>Date</th>


      </tr>
    </thead>
    <tbody>
    {% for i in F %}

      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.message }}</td>
        <td>{{ i.date }}</td>

      </tr>

     {% endfor %}

    </tbody>
  </table>
</div>
</div>

{% include 'admin_footer.html' %}
