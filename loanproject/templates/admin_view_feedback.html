{% include 'admin_header.html' %}

<style>
  /* ═══════════════ GLOBAL VARIABLES ═══════════════ */
  :root {
    --card-bg: #ffffff;
    --border-light: #eaedf2;
    --text-dark: #1a202c;
    --text-muted: #718096;
    --primary-blue: #2563eb;
    --radius-md: 12px;
  }

  /* ═══════════════ LAYOUT & TYPOGRAPHY ═══════════════ */
  .main-scroll {
    padding: 25px 40px 60px;
    max-width: 1400px;
    margin: 0 auto;
    font-family: 'Inter', sans-serif;
  }

  .section-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-dark);
    margin: 40px 0 20px 0;
  }
  .section-title.primary-colored {
    color: var(--primary-blue);
  }

  /* ═══════════════ TABLE STYLES ═══════════════ */
  .table-wrap {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    border: 1px solid var(--border-light);
    overflow: hidden; /* Contains the border radius */
  }

  .table-scroll {
    width: 100%;
    overflow-x: auto;
    overflow-y: auto;
    max-height: 520px;
  }

  table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
    table-layout:fixed;
}

  /* Sticky Header */
  table th {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 16px 25px;
    font-size: 10px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    background: #FAFBFD;
    /* Use box-shadow for borders on sticky headers so they don't scroll away */
    box-shadow: inset 0 -1px 0 var(--border-light);
    letter-spacing: 0.5px;
  }

  table td {
    padding: 18px 25px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    border-bottom: 1px solid var(--border-light);
    line-height: 1.5;
  }

  table tbody tr:last-child td {
    border-bottom: none; /* Clean up bottom edge */
  }
</style>
  <!-- ══════════════════ MAIN ══════════════════ -->


  <div class="topbar">
    <div class="pg-title" id="pgTitle">Dashboard</div>
    <div class="topbar-r">
      <!-- Search Form with Basic HTML5 Validation -->
      <form class="search-form" action="#" onsubmit="event.preventDefault();">
        <input type="text" placeholder="Search users or complaints..." required minlength="3" title="Please enter at least 3 characters">
        <button type="submit">🔍</button>
      </form>

      <div class="theme-btn" onclick="toggleTheme()">
        <div class="tgl"><div class="tgl-k"></div></div>
        <span id="tglLbl">Light Mode</span>
      </div>
    </div>
  </div>
<div class="main-scroll">

  <div class="section-title primary-colored">All Feedbacks</div>

  <div class="table-wrap">
    <!-- scrollable wrapper -->
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th style="width: 10%;">#</th>
            <th style="width: 70%;">Message</th>
            <th style="width: 20%;">Date Submitted</th>
          </tr>
        </thead>
        <tbody>
          {% for i in F %}
          <tr>
            <td style="color:var(--text-muted);">{{ forloop.counter|stringformat:"03d" }}</td>
            <td>{{ i.message }}</td>
            <td style="color:var(--text-muted);">{{ i.date|default:"-" }}</td>
          </tr>
          {% empty %}
          <!-- Empty State handling -->
          <tr>
            <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 45px;">
              <div style="font-size: 32px; margin-bottom: 10px;">💬</div>
              <span style="font-size: 13px; font-weight: 600;">No feedbacks have been submitted yet.</span>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</div>

{% include 'admin_footer.html' %}
