<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustify — Adminify Premium Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        adminify: {
                            active: '#4f46e5', // Royal Indigo active color from wp-adminify-for-wordpress-dashboard.png
                            hover: '#f3f4f6',
                            border: '#e5e7eb',
                            darkBg: '#0f172a',
                            lightBg: '#f8fafc',
                            banner: '#111115', // Dark banner color
                            textDark: '#0f172a',
                            textMuted: '#6b7280',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Dark mode overrides styled matching the adminify profile */
        html[data-theme="dark"] body {
            background-color: #0b0f19;
            color: #f1f5f9;
        }

        /* Border transitions */
        .admin-border {
            border: 1px solid #e5e7eb;
        }
        html[data-theme="dark"] .admin-border {
            border: 1px solid #1e293b;
        }

        .admin-card {
            background-color: #ffffff;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        html[data-theme="dark"] .admin-card {
            background-color: #111827;
        }

        /* Custom styling to map exact Adminify Sidebar layout */
        .sidebar-active {
            background-color: #4f46e5 !important;
            color: #ffffff !important;
        }

        html[data-theme="dark"] .sidebar-active {
            background-color: #4f46e5 !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row overflow-x-hidden">

    <!-- TOAST NOTIFICATION SYSTEM -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2.5 pointer-events-none max-w-sm w-full"></div>

    <!-- ══════════════ SIDEBAR (Styled exactly after "wp-adminify-for-wordpress-dashboard.png") ══════════════ -->
    <aside class="w-full lg:w-60 bg-white dark:bg-[#111827] admin-border border-r flex flex-col justify-between sticky top-0 lg:h-screen z-40 transition-all duration-300">
        <div>
            <!-- Sidebar Header / Logo -->
            <div class="px-5 py-4 border-b border-gray-100 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="p-1.5 bg-indigo-600 rounded-lg text-white">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="9" width="18" height="12" rx="2"/>
                            <path d="M3 9l9-6 9 6"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-base tracking-tight text-slate-800 dark:text-white flex items-center gap-1.5">
                            Trustify
                        </h1>
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <button id="mobile-menu-toggle" class="lg:hidden p-1.5 rounded bg-gray-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200" aria-label="Toggle Menu">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>

            <!-- Sidebar Nav Links -->
            <nav id="nav-menu" class="hidden lg:flex flex-col p-3 gap-0.5">

                <!-- Dashboard Active Block Category (with Home and Updates sub-links as seen in wp-adminify-for-wordpress-dashboard.png) -->
                <div class="mb-1">
                    <button onclick="window.location.href='/bank_home'" id="nav-bank_home" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-semibold transition-colors duration-150 text-slate-700 dark:text-slate-200 hover:bg-gray-100 dark:hover:bg-slate-800">
                        <div class="flex items-center gap-2.5">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                            <span>Dashboard</span>
                        </div>
                    </button>
                </div>

                <!-- CATEGORY: Loan Services -->
                <div class="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Financial Services</div>

                <button onclick="window.location.href='/bank_loan_types'" id="nav-bank_loan_types" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium transition-colors duration-150 text-slate-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span>Loan Types</span>
                    </div>
                    <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>

                <button onclick="window.location.href='/user_loan_request'" id="nav-user_loan_request" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium transition-colors duration-150 text-slate-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span>Loan Requests</span>
                    </div>
                    <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>

                <!-- CATEGORY: Support -->
                <div class="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Help Desk</div>

                <button onclick="window.location.href='/sent_complaint'"  id="nav-sent_complaint" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium transition-colors duration-150 text-slate-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14z"/></svg>
                        <span>Complaints</span>
                    </div>
                    <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>

                <button onclick="window.location.href='/view_reply'" id="nav-view_reply" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium transition-colors duration-150 text-slate-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
                        <span>Agent Replies</span>
                    </div>
                    <span id="replies-badge" class="px-1.5 py-0.5 text-[10px] font-bold text-white bg-rose-500 rounded-full hidden animate-pulse">0</span>
                </button>

                <button onclick="window.location.href='/send_feedback'" id="nav-send_feedback" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded text-sm font-medium transition-colors duration-150 text-slate-600 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800">
                    <div class="flex items-center gap-2.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        <span>Feedback</span>
                    </div>
                    <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>
            </nav>
        </div>

        <!-- Sidebar Footer Panel -->
        <div class="p-3 border-t border-gray-100 dark:border-slate-800">
            <!-- Logout Simulated Link -->
            <button onclick="window.location.href='/logout_view'" class="w-full flex items-center gap-2.5 px-3 py-2 rounded text-xs text-rose-500 hover:bg-rose-500/10 font-medium transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                Logout
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col min-w-0">
