<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustify — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           THEME TOKENS
        ═══════════════════════════════════════ */
        :root {
            --blue-600:  #2563eb;
            --blue-500:  #3b82f6;
            --blue-400:  #60a5fa;
            --blue-300:  #93c5fd;
            --blue-100:  rgba(59,130,246,0.12);
            --blue-050:  rgba(59,130,246,0.06);

            --green:     #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --amber:     #f59e0b;
            --amber-dim: rgba(245,158,11,0.12);
            --red:       #ef4444;
            --red-dim:   rgba(239,68,68,0.12);
            --purple:    #a855f7;
            --purple-dim:rgba(168,85,247,0.12);

            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --sidebar-w: 248px;

            --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── DARK ── */
        [data-theme="dark"] {
            --bg:          #080c14;
            --bg-2:        #0d1220;
            --surface:     #111827;
            --surface-2:   #162032;
            --surface-3:   #1c2a3f;
            --border:      rgba(255,255,255,0.07);
            --border-2:    rgba(255,255,255,0.12);
            --txt-1:       #f0f4ff;
            --txt-2:       rgba(240,244,255,0.65);
            --txt-3:       rgba(240,244,255,0.35);
            --topbar-blur: rgba(8,12,20,0.85);
        }

        /* ── LIGHT ── */
        [data-theme="light"] {
            --bg:          #f0f4ff;
            --bg-2:        #e8eef8;
            --surface:     #ffffff;
            --surface-2:   #f5f8ff;
            --surface-3:   #eef2fb;
            --border:      rgba(37,99,235,0.1);
            --border-2:    rgba(37,99,235,0.2);
            --txt-1:       #0f172a;
            --txt-2:       rgba(15,23,42,0.65);
            --txt-3:       rgba(15,23,42,0.38);
            --topbar-blur: rgba(240,244,255,0.88);
        }

        /* ═══════════════════════════════════════
           BASE
        ═══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 15px; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--txt-1);
            display: flex;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

        /* ═══════════════════════════════════════
           SIDEBAR
        ═══════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            z-index: 200;
            transition: background var(--transition), border-color var(--transition);
        }

        .brand {
            padding: 26px 20px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-400));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(37,99,235,0.4);
        }

        .brand-icon svg { color: #fff; }

        .brand-text { line-height: 1.2; }
        .brand-name  { font-size: 1.05rem; font-weight: 800; color: var(--txt-1); letter-spacing: -0.02em; }
        .brand-tag   { font-size: 0.62rem; color: var(--txt-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }

        .nav-scroll { flex: 1; overflow-y: auto; padding: 16px 12px; }

        .nav-section {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--txt-3);
            padding: 14px 10px 7px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            color: var(--txt-2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition);
            margin-bottom: 2px;
            position: relative;
        }

        .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }

        .nav-link:hover { background: var(--blue-050); color: var(--blue-400); }

        .nav-link.active {
            background: var(--blue-100);
            color: var(--blue-400);
            font-weight: 600;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0; top: 7px; bottom: 7px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--blue-500);
        }

        .nav-badge {
            background: var(--blue-600);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }

        /* ── SUB MENU ── */
        .nav-sub {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1);
            margin: 2px 0 2px 28px;
            border-left: 2px solid var(--border-2);
            padding-left: 6px;
        }

        .nav-sub.open { max-height: 140px; }

        .nav-sub-link {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 12px;
            border-radius: var(--r-sm);
            color: var(--txt-3);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all var(--transition);
            margin-bottom: 1px;
        }

        .nav-sub-link:hover { background: var(--blue-050); color: var(--blue-400); }
        .nav-sub-link.active { background: var(--blue-100); color: var(--blue-400); font-weight: 600; }

        .nav-link.sub-open .chevron { transform: rotate(180deg) !important; }
        .nav-link.sub-open { color: var(--blue-400); }

        .sidebar-footer {
            padding: 14px 12px;
            border-top: 1px solid var(--border);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 12px;
            border-radius: var(--r-sm);
            background: var(--surface-2);
            cursor: pointer;
            transition: background var(--transition);
        }

        .user-row:hover { background: var(--surface-3); }

        .user-av {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-400));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.75rem; color: #fff;
            flex-shrink: 0;
        }

        .user-name { font-size: 0.82rem; font-weight: 600; color: var(--txt-1); }
        .user-role { font-size: 0.67rem; color: var(--txt-3); }

        /* ═══════════════════════════════════════
           MAIN
        ═══════════════════════════════════════ */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            height: 66px;
            background: var(--topbar-blur);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--transition), border-color var(--transition);
        }

        .page-title   { font-size: 1.05rem; font-weight: 700; color: var(--txt-1); letter-spacing: -0.02em; }
        .page-subtitle{ font-size: 0.72rem; color: var(--txt-3); margin-top: 1px; }

        .topbar-right { display: flex; align-items: center; gap: 10px; }

        .search {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            transition: border-color var(--transition), background var(--transition);
        }

        .search:focus-within { border-color: var(--blue-500); }
        .search input {
            border: none; background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.82rem; color: var(--txt-1); outline: none; width: 180px;
        }

        .search input::placeholder { color: var(--txt-3); }

        /* theme toggle */
        .theme-toggle {
            width: 52px; height: 28px;
            border-radius: 28px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            position: relative;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--blue-500);
            top: 3px; left: 3px;
            transition: transform var(--transition);
            box-shadow: 0 2px 6px rgba(59,130,246,0.4);
        }

        [data-theme="light"] .theme-toggle::after { transform: translateX(24px); }

        .theme-icon {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            display: flex; align-items: center;
            pointer-events: none;
        }

        .icon-moon { left: 7px;  color: var(--txt-3); }
        .icon-sun  { right: 7px; color: var(--txt-3); }

        [data-theme="light"] .icon-moon { opacity: 0; }
        [data-theme="dark"]  .icon-sun  { opacity: 0; }

        .tb-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--txt-2);
            position: relative;
            transition: all var(--transition);
        }

        .tb-btn:hover { border-color: var(--blue-500); color: var(--blue-400); background: var(--blue-050); }

        .tb-pip {
            position: absolute; top: 7px; right: 7px;
            width: 6px; height: 6px;
            background: var(--blue-500); border-radius: 50%;
            border: 1.5px solid var(--surface);
        }

        .tb-av {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-400));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.76rem; color: #fff;
            cursor: pointer;
        }

        /* ═══════════════════════════════════════
           PAGE BODY
        ═══════════════════════════════════════ */
        .page { padding: 24px 28px; flex: 1; }

        /* ── STAT CARDS ── */
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 20px 22px;
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: background var(--transition), border-color var(--transition), transform 0.2s;
        }

        .stat:hover { transform: translateY(-2px); border-color: var(--border-2); }

        /* gradient glow corner */
        .stat::after {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 90px; height: 90px;
            border-radius: 50%;
            opacity: 0.06;
        }

        .stat-primary::after  { background: var(--blue-500); opacity: 0.2; }
        .stat-green::after    { background: var(--green); opacity: 0.2; }
        .stat-amber::after    { background: var(--amber); opacity: 0.2; }
        .stat-red::after      { background: var(--red); opacity: 0.2; }

        /* featured stat */
        .stat.stat-featured {
            background: linear-gradient(135deg, var(--blue-600) 0%, #1e40af 100%);
            border-color: transparent;
            box-shadow: 0 8px 28px rgba(37,99,235,0.35);
        }

        .stat.stat-featured .s-label,
        .stat.stat-featured .s-change { color: rgba(255,255,255,0.65); }
        .stat.stat-featured .s-value  { color: #fff; }

        .s-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }

        .s-icon {
            width: 42px; height: 42px;
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
        }

        .ic-blue   { background: var(--blue-100);   color: var(--blue-400); }
        .ic-green  { background: var(--green-dim);  color: var(--green); }
        .ic-amber  { background: var(--amber-dim);  color: var(--amber); }
        .ic-red    { background: var(--red-dim);    color: var(--red); }
        .ic-white  { background: rgba(255,255,255,0.15); color: #fff; }

        .s-badge {
            font-size: 0.7rem; font-weight: 600;
            padding: 3px 8px; border-radius: 20px;
        }

        .badge-up   { background: var(--green-dim); color: var(--green); }
        .badge-down { background: var(--red-dim);   color: var(--red); }
        .badge-white{ background: rgba(255,255,255,0.2); color: #fff; }

        .s-value { font-size: 1.85rem; font-weight: 800; color: var(--txt-1); letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; }
        .s-label { font-size: 0.76rem; color: var(--txt-3); }
        .s-change { font-size: 0.7rem; color: var(--txt-3); margin-top: 6px; }

        /* ── QUICK ACTIONS ── */
        .quick { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 22px; }

        .qbtn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 15px 16px;
            display: flex; align-items: center; gap: 13px;
            cursor: pointer; text-decoration: none;
            transition: all var(--transition);
        }

        .qbtn:hover {
            border-color: var(--blue-500);
            background: var(--blue-050);
            transform: translateY(-1px);
        }

        .qbtn:hover .qi { background: var(--blue-600); color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,0.4); }
        .qbtn:hover .ql { color: var(--blue-400); }

        .qi {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--txt-2); flex-shrink: 0;
            transition: all var(--transition);
        }

        .ql { font-size: 0.82rem; font-weight: 600; color: var(--txt-2); transition: color var(--transition); }
        .qs { font-size: 0.7rem; color: var(--txt-3); margin-top: 1px; }

        /* ── GRID ── */
      .grid-main {
    display: grid;
    grid-template-columns: 0fr 250px; /* right side smaller relative to left */
    gap: 8px;
    margin-bottom: 22px;
}        .col-flex { display: flex; flex-direction: column; gap: 18px; }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            transition: background var(--transition), border-color var(--transition);
        }

        .card-head {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .card-title { font-size: 0.92rem; font-weight: 700; color: var(--txt-1); letter-spacing: -0.01em; }
        .card-link  { font-size: 0.75rem; color: var(--blue-400); text-decoration: none; font-weight: 600; transition: opacity 0.18s; }
        .card-link:hover { opacity: 0.7; }
        .card-body  { padding: 18px 22px; }

        /* ── CHART ── */
        .chart-outer { padding: 0 0 24px; }

        .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

        .chart-tabs { display: flex; gap: 4px; }

        .ctab {
            font-size: 0.72rem; font-weight: 600;
            padding: 5px 12px; border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent; color: var(--txt-3);
            cursor: pointer; transition: all var(--transition);
        }

        .ctab.active, .ctab:hover { background: var(--blue-100); color: var(--blue-400); border-color: var(--blue-500); }

        .chart-container {
            background: var(--surface-2);
            border-radius: var(--r-md);
            padding: 20px 16px 0;
            height: 190px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* horizontal grid lines */
        .chart-container::before {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                transparent,
                transparent calc(25% - 1px),
                var(--border) calc(25% - 1px),
                var(--border) 25%
            );
            pointer-events: none;
        }

        .bar-g { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }

        .bar {
            width: 100%; border-radius: 6px 6px 0 0;
            min-height: 6px;
            position: relative; z-index: 1;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .bar:hover { opacity: 0.75; }

        .bar.b-blue { background: linear-gradient(180deg, var(--blue-500), var(--blue-600)); }
        .bar.b-dim  { background: var(--surface-3); }

        .bar-label {
            position: absolute; bottom: -19px;
            left: 50%; transform: translateX(-50%);
            font-size: 0.58rem; color: var(--txt-3); white-space: nowrap;
        }

        .chart-legend { display: flex; gap: 18px; margin-top: 30px; }
        .leg { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; color: var(--txt-3); }
        .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

        /* ── TABLE ── */
        .tbl-wrap { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

        thead th {
            padding: 11px 16px;
            text-align: left; font-size: 0.67rem;
            font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--txt-3);
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--txt-1); vertical-align: middle; white-space: nowrap;
            transition: background var(--transition);
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--surface-2); }

        .badge {
            display: inline-flex; align-items: center;
            padding: 3px 9px; border-radius: 20px;
            font-size: 0.68rem; font-weight: 700;
        }

        .b-green  { background: var(--green-dim);  color: var(--green); }
        .b-amber  { background: var(--amber-dim);  color: var(--amber); }
        .b-red    { background: var(--red-dim);    color: var(--red); }
        .b-blue   { background: var(--blue-100);   color: var(--blue-400); }
        .b-purple { background: var(--purple-dim); color: var(--purple); }

        .prog-row { display: flex; align-items: center; gap: 10px; }
        .prog-track { flex: 1; height: 5px; background: var(--surface-3); border-radius: 5px; overflow: hidden; }
        .prog-fill  { height: 100%; border-radius: 5px; }
        .pf-blue   { background: linear-gradient(90deg, var(--blue-600), var(--blue-400)); }
        .pf-green  { background: var(--green); }
        .pf-amber  { background: var(--amber); }
        .pf-red    { background: var(--red); }
        .prog-pct  { font-size: 0.7rem; color: var(--txt-3); width: 32px; text-align: right; }

        .act-btn {
            width: 30px; height: 30px; border-radius: 7px;
            border: 1px solid var(--border); background: var(--surface-2);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--txt-3);
            transition: all var(--transition);
        }

        .act-btn:hover { border-color: var(--blue-500); color: var(--blue-400); background: var(--blue-050); }
        .act-btn.del:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

        /* ── TRANSACTIONS ── */
        .tx-list { list-style: none; }

        .tx-item {
            display: flex; align-items: center; gap: 13px;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.18s;
        }

        .tx-item:last-child { border-bottom: none; }
        .tx-item:hover { opacity: 0.8; }

        .tx-av {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.76rem; flex-shrink: 0;
        }

        .tx-name { font-size: 0.82rem; font-weight: 600; color: var(--txt-1); }
        .tx-time { font-size: 0.68rem; color: var(--txt-3); margin-top: 1px; }
        .tx-r    { margin-left: auto; text-align: right; }
        .tx-amt  { font-size: 0.88rem; font-weight: 700; color: var(--txt-1); }
        .tx-st   { font-size: 0.68rem; margin-top: 2px; }

        .st-ok   { color: var(--green); }
        .st-warn { color: var(--amber); }
        .st-fail { color: var(--red); }

        /* ── LOAN TYPES ── */
        .lt-item {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 14px; border-radius: var(--r-md);
            background: var(--surface-2);
            border: 1px solid var(--border);
            margin-bottom: 9px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .lt-item:last-child { margin-bottom: 0; }
