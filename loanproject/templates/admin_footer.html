

</div>
<script>


function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('tglLbl').textContent = dark ? 'Dark Mode' : 'Light Mode';
  localStorage.setItem('sl-theme', dark ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('sl-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('tglLbl').textContent = saved === 'dark' ? 'Dark Mode' : 'Light Mode';
  }
})();

// Sidebar active + header title update
const navLinks = document.querySelectorAll('.nav-link');
const pgTitle = document.getElementById('pgTitle');

// Function to update title
function updateHeader(link) {
  const text = link.querySelector('.nav-link-text').textContent;
  pgTitle.textContent = text;
}

navLinks.forEach(link => {
  link.addEventListener('click', function () {
    // remove active
    navLinks.forEach(l => l.classList.remove('active'));

    // set active
    this.classList.add('active');

    // update header
    updateHeader(this);
  });
});


// On page load (for refresh/navigation)
const currentPath = window.location.pathname;

navLinks.forEach(link => {
  if (link.getAttribute('href') === currentPath) {
    navLinks.forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    updateHeader(link);
  }
});
</script>
</body>
</html>
