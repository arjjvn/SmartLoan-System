<script>
// Maintained logic, without changes to underlying interactions.
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('tglLbl').textContent = isDark ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('sl-theme', isDark ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('sl-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('tglLbl').textContent = saved === 'dark' ? 'Dark Mode' : 'Light Mode';
  }
})();

// Sidebar active update
const navLinks = document.querySelectorAll('.nav-link');
navLinks.forEach(link => {
  link.addEventListener('click', function () {
    navLinks.forEach(l => l.classList.remove('active'));
    this.classList.add('active');
  });
});

// On page load set active link
const currentPath = window.location.pathname;
navLinks.forEach(link => {
  if (link.getAttribute('href') === currentPath) {
    navLinks.forEach(l => l.classList.remove('active'));
    link.classList.add('active');
  }
});
</script>
</body>
</html>
