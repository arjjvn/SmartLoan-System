<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustify Dashboard</title>
<!-- Using Nunito to match the rounded, friendly modern typography of the provided image -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Color Palette derived from the "Mentalthy" image */
    --bg-body: #F3F6FC;
    --sidebar-bg: #F3F6FC; /* Seamless with background */
    --card-bg: #FFFFFF;
    --primary-blue: #3763EF;
    --primary-hover: #294ddb;
    --text-dark: #2C324B;
    --text-muted: #8E98B0;
    --text-light: #B4BCCD;
    --border-light: #E8EDF5;

    --badge-green-bg: #E3F5EE;
    --badge-green-text: #219653;
    --badge-orange-bg: #FEF0E6;
    --badge-orange-text: #F2994A;
    --badge-red-bg: #FDE8E8;
    --badge-red-text: #EB5757;

    --radius-lg: 7px;
    --radius-md: 4px;
    --font-main: 'Nunito', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background-color: var(--bg-body);
    color: var(--text-dark);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ══════════════════ SIDEBAR ══════════════════ */
  .sidebar {
    width: 260px;
    background-color: var(--sidebar-bg);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sb-brand { margin-bottom: 40px; padding: 0 10px; display: flex; align-items: center; gap: 8px; }
  .brand-icon { display: none; } /* Hidden to match clean text logo of the image */
  .brand-name { font-size: 24px; font-weight: 800; color: var(--primary-blue); letter-spacing: -0.5px; }
  .brand-name::after { content: '.'; }
  .brand-sub { display: none; }

  .sb-nav { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .nav-group { margin-bottom: 15px; }
  .nav-sep-label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-light);
    margin: 10px 0 10px 15px; text-transform: capitalize;
  }

  .nav-link {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; color: var(--text-muted);
    text-decoration: none; font-weight: 700; font-size: 14px;
    border-radius: var(--radius-md); transition: 0.2s ease;
  }
  .nav-link:hover { color: var(--text-dark); background: rgba(55, 99, 239, 0.05); }
  .nav-link.active {
    background-color: rgba(55, 99, 239, 0.1);
    color: var(--text-dark);
  }
  .n-ico { font-size: 18px; opacity: 0.7; }
  .nav-link.active .n-ico { opacity: 1; color: var(--primary-blue); }

  .sb-divider { display: none; } /* Clean look, no lines */

  .sb-bottom { margin-top: auto; }
  .logout-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; color: var(--text-muted);
    text-decoration: none; font-weight: 700; font-size: 14px;
  }

  /* ══════════════════ MAIN CONTENT ══════════════════ */
  .main {
    flex: 1; padding: 40px 50px; overflow-y: auto;
  }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .pg-title { font-size: 32px; font-weight: 800; color: var(--text-dark); }

  .topbar-r { display: flex; align-items: center; gap: 16px; }
  .theme-btn {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    background: var(--card-bg); padding: 10px 15px; border-radius: 30px;
    font-size: 13px; font-weight: 700; color: var(--text-dark);
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
  }
  .tgl { width: 30px; height: 16px; background: var(--border-light); border-radius: 10px; position: relative; }
  .tgl-k { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; }

  .tabs { display: none; } /* Hide raw tabs to match image aesthetic */

  /* Validation UI added to match the image's top filter bar. Uses basic HTML5 validation. */
  .filter-form {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    margin-bottom: 40px;
  }
  .filter-group { flex: 1; display: flex; flex-direction: column; position: relative; }
  .filter-group label { font-size: 11px; color: var(--text-light); font-weight: 600; margin-bottom: 4px; }
  .filter-group select {
    border: none; outline: none; font-family: var(--font-main);
    font-size: 14px; font-weight: 700; color: var(--text-dark); background: transparent;
    cursor: pointer; appearance: none;
  }
  .filter-group::after {
    content: '⌄'; position: absolute; right: 10px; top: 18px; color: var(--text-dark); font-size: 16px; pointer-events: none;
  }
  /* HTML5 Validation styling */
  .filter-group select:invalid { color: var(--text-muted); }
  .filter-form-btn {
    background: var(--bg-body); border: none; width: 45px; height: 45px;
    border-radius: 14px; cursor: pointer; color: var(--text-dark);
    display: flex; justify-content: center; align-items: center; font-size: 18px; transition: 0.2s;
  }
  .filter-form-btn:hover { background: #E0E6F3; }

  /* Stats row mapping to large summary display */
  .stat-row { display: flex; gap: 20px; margin-bottom: 30px; }
  .stat-card {
    flex: 1; background: var(--card-bg); padding: 25px; border-radius: var(--radius-lg);
    box-shadow: 0 8px 20px rgba(0,0,0,0.02);
  }
  .s-lbl { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .s-val, .s-change { font-size: 28px; font-weight: 800; color: var(--text-dark); }

  /* Section Headers */
  .s-h-lbl {
    font-size: 22px; font-weight: 800; color: var(--text-dark);
    margin: 10px 0 20px 0; display: flex; align-items: center; gap: 15px;
  }
  .s-h-lbl::after { /* Emulate the count pill in the image */
    content: 'Total'; font-size: 12px; background: var(--border-light); color: var(--text-muted);
    padding: 3px 10px; border-radius: 20px; font-weight: 700;
  }

  /* Grid mimicking "Best for you" section */
  .bank-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px; margin-bottom: 40px;
  }

  /* Bank Cards mimicking Doctor Cards */
  .bank-card {
    background: var(--card-bg); border-radius: var(--radius-lg); padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03); display: flex; flex-direction: column;
    position: relative;
  }
  .bk-name { font-size: 18px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
  .bk-loc {
    font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 20px;
    display: flex; align-items: center; gap: 5px;
  }
  .bk-loc::before { content: '◎'; font-size: 14px; }

  /* Stats mimicking tags in the picture */
  .bk-stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
  .bk-s {
    background: var(--bg-body); padding: 6px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .bk-sl { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .bk-sv { font-size: 11px; color: var(--text-dark); font-weight: 800; }

  /* Button injected via CSS to match "Book Consultation" */
  .bank-card::after {
    content: 'Manage Bank'; display: block; margin-top: auto;
    background: var(--primary-blue); color: white; text-align: center;
    padding: 14px; border-radius: 12px; font-weight: 700; font-size: 13px;
    cursor: pointer; transition: 0.2s;
  }
  .bank-card:hover::after { background: var(--primary-hover); }

  /* Register Bank placeholder */
  .bank-card.add-bank {
    background: transparent; border: 2px dashed #D2D8E6; box-shadow: none;
    justify-content: center; align-items: center; cursor: pointer;
  }
  .bank-card.add-bank:hover { background: rgba(55, 99, 239, 0.03); border-color: var(--primary-blue); }
  .bank-card.add-bank::after { display: none; }

  /* Tables styling for Users/Complaints to blend with modern aesthetic */
  .table-wrap {
    background: var(--card-bg); border-radius: var(--radius-lg); padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 40px;
  }
  .tw-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .tw-title { font-size: 18px; font-weight: 800; color: var(--text-dark); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 10px; font-size: 12px; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-light); }
  td { padding: 16px 10px; font-size: 14px; font-weight: 600; color: var(--text-dark); border-bottom: 1px solid var(--bg-body); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  .u-name { font-weight: 800; color: var(--text-dark); }
  .u-email, .c-text { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

  /* Badges */
  .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; }
  .b-green { background: var(--badge-green-bg); color: var(--badge-green-text); }
  .b-amber { background: var(--badge-orange-bg); color: var(--badge-orange-text); }
  .b-red { background: var(--badge-red-bg); color: var(--badge-red-text); }

  /* Feedback Grid & Two Column Layout */
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
  .s-head { display: flex; justify-content: space-between; align-items: center; }
  .fb-grid { display: grid; gap: 20px; }

  .fb-card {
    background: var(--card-bg); border-radius: var(--radius-lg); padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03);
  }
  .fb-q { font-size: 14px; font-weight: 600; color: var(--text-dark); line-height: 1.6; margin-bottom: 20px; }
  .fb-from { display: flex; align-items: center; gap: 15px; }
  .fb-av {
    width: 45px; height: 45px; border-radius: 50%; background: var(--primary-blue);
    color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;
  }
  .fb-name { font-weight: 800; font-size: 14px; color: var(--text-dark); }
  .fb-date { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

  /* Side Column Cards */
  .side-col { display: flex; flex-direction: column; gap: 25px; }
  .side-card {
    background: var(--card-bg); border-radius: var(--radius-lg); padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03); text-align: left !important;
  }
  .sc-title { font-size: 18px; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; }

  .cap-row { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-light); }
  .cap-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .cap-name { font-weight: 800; font-size: 14px; color: var(--text-dark); margin-bottom: 4px; }
</style>
</head>
<body>

    <div class="brand-icon">🏦</div>

  <nav class="sb-nav">
    <div class="nav-group">
      <a class="nav-link active" href="/admin_home">
        <span class="n-ico">⊞</span>

<div class="main">

  <div class="topbar">

      <div class="theme-btn" onclick="toggleTheme()">
        <div class="tgl"><div class="tgl-k"></div></div>

      </div>

  <div class="tabs" id="tabBar">
    <div class="tab active">Overview</div>
  </div>

  <div class="content">
