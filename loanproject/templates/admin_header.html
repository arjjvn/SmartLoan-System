



<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartLoan Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>

/* ═══════════════════════════ THEME ═══════════════════════════ */
[data-theme="dark"] {
  --root:       #1a1a1f;
  --sidebar:    #111114;
  --card:       #1e1e23;
  --card2:      #252529;
  --item:       #2a2a30;
  --hover:      #2f2f36;
  --active:     #2a2a32;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.04);
  --ink:        #ececed;
  --ink2:       #909096;
  --ink3:       #545458;
  --ink4:       #323236;
  --acc:        #e8594a;
  --green:      #3ecf6e;
  --green-bg:   rgba(62,207,110,0.13);
  --blue:       #4a9eff;
  --blue-bg:    rgba(74,158,255,0.13);
  --purple:     #b57bee;
  --purple-bg:  rgba(181,123,238,0.13);
  --amber:      #f5a623;
  --amber-bg:   rgba(245,166,35,0.13);
  --red:        #f2564a;
  --red-bg:     rgba(242,86,74,0.13);
  --shadow:     0 1px 2px rgba(0,0,0,.6), 0 4px 16px rgba(0,0,0,.35);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.55);
  --inp:        rgba(255,255,255,0.06);
  --tgl-bg:     #2a2a30;
  --tgl-k:      #545458;
}

[data-theme="light"] {
  --root:       #f0f0f5;
  --sidebar:    #fafafa;
  --card:       #ffffff;
  --card2:      #f5f5f8;
  --item:       #ebebf0;
  --hover:      #e4e4ea;
  --active:     #e0e0e8;
  --border:     rgba(0,0,0,0.07);
  --border2:    rgba(0,0,0,0.04);
  --ink:        #17171a;
  --ink2:       #5c5c65;
  --ink3:       #a0a0aa;
  --ink4:       #d0d0da;
  --acc:        #e8594a;
  --green:      #22a24c;
  --green-bg:   rgba(34,162,76,0.10);
  --blue:       #2575e0;
  --blue-bg:    rgba(37,117,224,0.10);
  --purple:     #8b45cc;
  --purple-bg:  rgba(139,69,204,0.10);
  --amber:      #d4830a;
  --amber-bg:   rgba(212,131,10,0.10);
  --red:        #d63c31;
  --red-bg:     rgba(214,60,49,0.10);
  --shadow:     0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.10);
  --inp:        #ebebf0;
  --tgl-bg:     #2575e0;
  --tgl-k:      #ffffff;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--root);color:var(--ink);display:flex;font-size:13px;line-height:1.45;transition:background .3s,color .3s}
button{font-family:'Inter',sans-serif}
a{text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:3px}

/* ═══════════════════════════ SIDEBAR ═══════════════════════════ */
.sidebar{
  width:240px;min-width:240px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
  transition:background .3s,border-color .3s;
  flex-shrink:0;
}

/* logo row */
.sb-brand{
  display:flex;align-items:center;gap:10px;
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  margin-bottom:6px;
}
.brand-icon{
  width:36px;height:36px;background:var(--acc);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:#fff;
  box-shadow:0 2px 10px rgba(232,89,74,.45);
  flex-shrink:0;
}
.brand-text{flex:1}
.brand-name{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.1}
.brand-sub{font-size:10px;color:var(--ink3);font-weight:500;margin-top:1px}

/* search */
.sb-search{padding:0 14px 12px}
.s-box{
  display:flex;align-items:center;gap:8px;
  background:var(--inp);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;
  transition:border-color .2s,box-shadow .2s;
}
.s-box:focus-within{border-color:rgba(232,89,74,.4);box-shadow:0 0 0 3px rgba(232,89,74,.08)}
.s-box input{
  background:transparent;border:none;outline:none;
  font-family:'Inter',sans-serif;font-size:12.5px;color:var(--ink);flex:1;min-width:0;
}
.s-box input::placeholder{color:var(--ink3)}
.s-ico{font-size:12px;color:var(--ink3)}
.kbd{
  font-size:9px;color:var(--ink3);
  background:var(--item);border:1px solid var(--border);
  border-radius:4px;padding:1px 5px;font-family:monospace;flex-shrink:0;
}

/* nav */
.sb-nav{padding:0 10px;flex:1;overflow-y:auto}
.nav-group{margin-bottom:6px}
.nav-sep-label{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink3);
  padding:10px 8px 5px;display:block;
}
.nav-link{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  color:var(--ink2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .18s;position:relative;
  margin-bottom:2px;user-select:none;
}
.nav-link:hover{background:var(--hover);color:var(--ink)}
.nav-link.active{background:var(--active);color:var(--ink);font-weight:600}
.nav-link.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--acc);border-radius:0 3px 3px 0;
}
.n-ico{
  width:30px;height:30px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  background:var(--item);border-radius:8px;
  transition:background .18s;
}
.nav-link:hover .n-ico{background:var(--hover)}
.nav-link.active .n-ico{background:rgba(232,89,74,.15)}
.nav-link-text{flex:1;font-size:13px}
.n-badge{
  margin-left:auto;background:var(--acc);color:#fff;
  font-size:10px;font-weight:700;min-width:19px;height:19px;
  border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;
}
.n-badge.soft{background:var(--item);color:var(--ink3);border:1px solid var(--border)}

.sb-divider{height:1px;background:var(--border);margin:6px 10px}

/* sidebar bottom - logout */
.sb-bottom{
  padding:10px 14px 16px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.sb-user{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:10px;
  background:var(--item);
  margin-bottom:8px;
  border:1px solid var(--border);
}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:10.5px;color:var(--ink3);font-weight:500}
.logout-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:9px 14px;border-radius:10px;
  background:var(--red-bg);border:1px solid rgba(242,86,74,.2);
  color:var(--red);font-size:12.5px;font-weight:600;
  cursor:pointer;transition:all .2s;
  font-family:'Inter',sans-serif;
}
.logout-btn:hover{background:rgba(242,86,74,.22);transform:translateY(-1px);box-shadow:0 4px 12px rgba(242,86,74,.15)}
.logout-btn:active{transform:translateY(0)}

/* ═══════════════════════════ MAIN AREA ═══════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* header */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 22px 12px;
  background:var(--sidebar);border-bottom:1px solid var(--border);
  flex-shrink:0;transition:background .3s;
}
.pg-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.03em}
.topbar-r{display:flex;align-items:center;gap:7px}

/* ─── FIXED THEME TOGGLE ─── */
.theme-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--item);border:1px solid var(--border);
  border-radius:8px;padding:5px 11px;cursor:pointer;
  font-size:11.5px;font-weight:500;color:var(--ink2);
  transition:all .2s;user-select:none;white-space:nowrap;
}
.theme-btn:hover{background:var(--hover);color:var(--ink)}

.tgl{
  width:30px;height:17px;
  background:var(--tgl-bg);
  border:1px solid var(--border);border-radius:9px;
  position:relative;transition:background .3s;flex-shrink:0;
}
.tgl-k{
  position:absolute;top:2.5px;left:2.5px;
  width:10px;height:10px;border-radius:50%;
  background:var(--tgl-k);transition:all .3s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
[data-theme="light"] .tgl-k{transform:translateX(13px)}
/* ─────────────────────────── */

.ic-btn{
  width:32px;height:32px;background:var(--item);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--ink3);transition:all .2s;position:relative;
}
.ic-btn:hover{background:var(--hover);color:var(--ink)}
.n-dot{
  position:absolute;top:7px;right:7px;
  width:6px;height:6px;border-radius:50%;
  background:var(--acc);border:1.5px solid var(--sidebar);
}
.usr-av{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;border:2px solid var(--border);
}

/* tabs */
.tabs{
  display:flex;gap:0;padding:0 22px;
  background:var(--sidebar);border-bottom:1px solid var(--border);
  flex-shrink:0;transition:background .3s;
}
.tab{
  padding:11px 14px;font-size:12.5px;font-weight:500;
  color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--ink);border-bottom-color:var(--acc);font-weight:600}

/* scroll area */
.content{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px}

/* sections */
.sect{display:none;flex-direction:column;gap:12px;animation:fi .3s ease}
.sect.active{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════ STAT CARDS ═══════════════════════════ */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);
  transition:all .22s;cursor:default;overflow:hidden;position:relative;
}
.stat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.s-lbl{font-size:11.5px;font-weight:500;color:var(--ink3);margin-bottom:10px}
.s-val{font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-.04em;line-height:1}
.s-change{font-size:11px;font-weight:600;margin-top:7px}
.up{color:var(--green)}
.dn{color:var(--red)}
.s-vis{position:absolute;right:14px;top:50%;transform:translateY(-50%)}

/* bar chart */
.bars{display:flex;align-items:flex-end;gap:2.5px;height:38px}
.bar{width:4.5px;border-radius:2px 2px 0 0;background:var(--acc);opacity:.8}

/* line */
.lpath{stroke:var(--purple);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* avatar cluster */
.av-cluster{display:flex;margin-bottom:4px}
.av-cluster .av{
  width:28px;height:28px;font-size:9px;
  margin-left:-8px;border:2.5px solid var(--card);
}
.av-cluster .av:first-child{margin-left:0}
.av-nums{display:flex;gap:10px;font-size:10.5px;font-weight:600;color:var(--ink3)}

/* ═══════════════════════════ TWO COL ═══════════════════════════ */
.two-col{display:grid;grid-template-columns:1fr 256px;gap:12px}

/* ═══════════════════════════ TASK CARDS ═══════════════════════════ */
.s-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.s-h-lbl{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.015em}
.btn-va{
  font-size:11.5px;font-weight:500;color:var(--ink3);
  background:var(--item);border:1px solid var(--border);
  border-radius:7px;padding:4px 11px;cursor:pointer;transition:all .2s;
}
.btn-va:hover{color:var(--ink);background:var(--hover)}

.task-list{display:flex;flex-direction:column;gap:7px}
.task-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:14px 16px;
  box-shadow:var(--shadow);transition:all .2s;cursor:pointer;
}
.task-card:hover{background:var(--card2);transform:translateX(1px)}
.t-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.t-time{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--ink3);font-weight:500;
}
.t-counts{display:flex;align-items:center;gap:9px;margin-left:auto}
.t-count{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--ink3)}
.t-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px;line-height:1.35;letter-spacing:-.01em}
.t-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{
  font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;
  border:1px solid transparent;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;
}
.t-red   {background:var(--red-bg);   color:var(--red);   border-color:rgba(242,86,74,.2)}
.t-amber {background:var(--amber-bg); color:var(--amber); border-color:rgba(245,166,35,.2)}
.t-blue  {background:var(--blue-bg);  color:var(--blue);  border-color:rgba(74,158,255,.2)}
.t-green {background:var(--green-bg); color:var(--green); border-color:rgba(62,207,110,.2)}
.t-purple{background:var(--purple-bg);color:var(--purple);border-color:rgba(181,123,238,.2)}
.t-gray  {background:var(--item);     color:var(--ink3);  border-color:var(--border)}
.t-prog  {background:rgba(245,166,35,.12);color:var(--amber);border-color:rgba(245,166,35,.25);display:inline-flex;align-items:center;gap:3px}
[data-theme="light"] .t-prog{background:rgba(212,131,10,.1);color:var(--amber)}

.t-avs{display:flex;margin-left:auto}
.t-avs .av{width:22px;height:22px;font-size:8px;margin-left:-6px;border:2px solid var(--card)}
.t-avs .av:first-child{margin-left:0}

/* ═══════════════════════════ SIDE PANELS ═══════════════════════════ */
.side-col{display:flex;flex-direction:column;gap:10px}
.side-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:14px 16px;box-shadow:var(--shadow);
}
.sc-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;letter-spacing:-.01em}
.cap-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border2);
}
.cap-row:last-child{border-bottom:none}
.cap-av{width:26px;height:26px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cap-name{font-size:12px;font-weight:500;color:var(--ink);flex:1}
.mention-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 0;border-bottom:1px solid var(--border2);
}
.mention-row:last-child{border-bottom:none}
.m-body{flex:1;min-width:0}
.m-name{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px}
.m-text{font-size:11.5px;color:var(--ink3);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-at{color:var(--blue);font-weight:600}

/* ═══════════════════════════ TABLES ═══════════════════════════ */
.table-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;overflow:hidden;box-shadow:var(--shadow);
}
.tw-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.tw-title{font-size:13.5px;font-weight:700;color:var(--ink)}
table{width:100%;border-collapse:collapse}
th{
  padding:9px 16px;font-size:10.5px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink3);text-align:left;
  background:var(--card2);border-bottom:1px solid var(--border);
}
td{
  padding:12px 16px;font-size:12.5px;color:var(--ink);
  border-bottom:1px solid var(--border2);vertical-align:middle;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
[data-theme="light"] tr:hover td{background:rgba(0,0,0,.015)}
.u-cell{display:flex;align-items:center;gap:8px}
.u-name{font-weight:600;font-size:12.5px}
.u-email{font-size:11px;color:var(--ink3);margin-top:1px}
.badge{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:20px;
  font-size:10.5px;font-weight:700;border:1px solid transparent;
}
.b-green {background:var(--green-bg); color:var(--green); border-color:rgba(62,207,110,.2)}
.b-amber {background:var(--amber-bg); color:var(--amber); border-color:rgba(245,166,35,.2)}
.b-red   {background:var(--red-bg);   color:var(--red);   border-color:rgba(242,86,74,.2)}
.b-blue  {background:var(--blue-bg);  color:var(--blue);  border-color:rgba(74,158,255,.2)}
.b-gray  {background:var(--item);     color:var(--ink3);  border-color:var(--border)}
.act-cell{display:flex;gap:5px;flex-wrap:wrap}

/* ═══════════════════════════ BUTTONS ═══════════════════════════ */
.btn{
  padding:5px 12px;border-radius:7px;font-size:11.5px;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:all .2s;
  display:inline-flex;align-items:center;gap:4px;white-space:nowrap;
}
.btn-acc  {background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-acc:hover{opacity:.88}
.btn-out  {background:var(--item);color:var(--ink2);border-color:var(--border)}
.btn-out:hover{background:var(--hover);color:var(--ink)}
.btn-red  {background:var(--red-bg);color:var(--red);border-color:rgba(242,86,74,.25)}
.btn-red:hover{background:rgba(242,86,74,.22)}
.btn-blue {background:var(--blue-bg);color:var(--blue);border-color:rgba(74,158,255,.25)}
.btn-blue:hover{background:rgba(74,158,255,.22)}
.btn-green{background:var(--green-bg);color:var(--green);border-color:rgba(62,207,110,.25)}
.btn-green:hover{background:rgba(62,207,110,.22)}

/* ═══════════════════════════ BANK GRID ═══════════════════════════ */
.bank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bank-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:16px;box-shadow:var(--shadow);
  transition:all .22s;position:relative;overflow:hidden;
}
.bank-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(232,89,74,.25)}
.bank-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc),transparent)}
.bk-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.bk-icon{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;letter-spacing:-1px;
}
.bk-name{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:2px;letter-spacing:-.01em}
.bk-loc{font-size:11px;color:var(--ink3)}
.bk-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:12px 0}
.bk-s{background:var(--item);border-radius:8px;padding:8px 10px}
.bk-sl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.bk-sv{font-size:15px;font-weight:700;color:var(--ink)}
.bk-acts{display:flex;gap:5px}
.add-bank{
  border:1.5px dashed var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:180px;cursor:pointer;
  opacity:.55;transition:all .22s;
}

/* ═══════════════════════════ MODAL ═══════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);z-index:999;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;animation:mbg .25s ease}
@keyframes mbg{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:490px;overflow:hidden;box-shadow:var(--shadow-lg),0 0 0 1px rgba(232,89,74,.15);animation:mpop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mpop{from{opacity:0;transform:scale(.86) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);}
.m-head h3{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-.015em}
.m-x{width:26px;height:26px;background:var(--item);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--ink3);transition:all .2s;}
.m-x:hover{background:var(--red-bg);color:var(--red)}
.m-body{padding:16px 18px}
.m-orig{background:var(--item);border:1px solid var(--border);border-left:3px solid var(--acc);border-radius:9px;padding:11px 13px;margin-bottom:13px;}
.m-from{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:5px}
.m-subj{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.m-msg{font-size:12px;color:var(--ink3);line-height:1.5}
.m-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.m-ta{width:100%;background:var(--inp);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--ink);resize:vertical;min-height:100px;outline:none;transition:border-color .2s,box-shadow .2s;}
.m-ta:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(232,89,74,.1)}
.m-ta::placeholder{color:var(--ink3)}
.m-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;background:var(--card2);}
.btn-cancel{background:var(--item);border:1px solid var(--border);color:var(--ink2);border-radius:8px;padding:6px 15px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-cancel:hover{background:var(--hover);color:var(--ink)}
.btn-send{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-send:hover{opacity:.88;transform:translateY(-1px)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 16px;border-radius:10px;font-size:12.5px;font-weight:600;box-shadow:0 4px 20px rgba(62,207,110,.4);z-index:9999;display:none;align-items:center;gap:7px;}
.toast.show{display:flex;animation:tst .3s ease}
@keyframes tst{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.no-due{color:var(--ink3);font-style:italic;font-size:12px}
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700}
.ar{background:#fca5a5;color:#7f1d1d}
.ab{background:#93c5fd;color:#1e3a5f}
.ag{background:#6ee7b7;color:#064e3b}
.ao{background:#fdba74;color:#7c2d12}
.ap{background:#c4b5fd;color:#3b0764}
.ak{background:#f9a8d4;color:#831843}
/* ═══════════════════════════ FEEDBACK ═══════════════════════════ */
.fb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fb-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;box-shadow:var(--shadow);transition:all .22s;}
.fb-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.fb-rating{font-size:20px;font-weight:800;color:var(--amber);letter-spacing:-.03em;margin-bottom:8px}
.fb-q{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px}
.fb-from{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--border2)}
.fb-name{font-size:11.5px;font-weight:600;color:var(--ink)}
.fb-date{font-size:10.5px;color:var(--ink3)}
.rb-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rb-lbl{font-size:11px;color:var(--ink3);width:30px;text-align:right;flex-shrink:0}
.rb-track{flex:1;height:5px;background:var(--item);border-radius:3px;overflow:hidden}
.rb-fill{height:100%;border-radius:3px;background:var(--amber);transition:width .5s}
.rb-n{font-size:11px;font-weight:600;color:var(--ink2);width:22px;flex-shrink:0}
.c-text{font-size:12px;color:var(--ink3);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-subj{font-size:12.5px;font-weight:600;color:var(--ink)}
.btn-reply:hover{background:var(--blue);color:#fff;border-color:var(--blue);}


</style>
