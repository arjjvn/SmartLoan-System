<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustify Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Color Palette derived exactly from the provided image */
    --bg-body: #F4F6F9;
    --sidebar-bg: #2B52C3; /* Deep Royal Blue */
    --sidebar-active: #4068D6; /* Lighter Blue for active state */
    --header-bg: #FFFFFF;
    --card-bg: #FFFFFF;

    --primary-blue: #3158D3; /* Main Brand Blue */
    --text-dark: #333333;
    --text-muted: #8E98B0;
    --text-light: #B4BCCD;
    --border-light: #E5E9F2;

    --badge-green-bg: #E3F5EE;
    --badge-green-text: #219653;
    --badge-orange-bg: #FEF0E6;
    --badge-orange-text: #F2994A;
    --badge-red-bg: #FDE8E8;
    --badge-red-text: #EB5757;

    --radius-lg: 6px;
    --radius-md: 4px;
    --font-main: 'Nunito', sans-serif;
  }

  /* Dark mode overrides (keeping existing toggle functional) */
  [data-theme="dark"] {
    --bg-body: #121212;
    --sidebar-bg: #1A1A1A;
    --sidebar-active: #333333;
    --header-bg: #1E1E1E;
    --card-bg: #1E1E1E;
    --primary-blue: #5C7CFA;
    --text-dark: #E0E0E0;
    --text-muted: #A0A0A0;
    --border-light: #2C2C2C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background-color: var(--bg-body);
    color: var(--text-dark);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ══════════════════ SIDEBAR ══════════════════ */
  .sidebar {
    width: 250px;
    background-color: var(--sidebar-bg);
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    color: white;
    box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    z-index: 10;
  }

  .sb-brand { margin-bottom: 35px; padding: 0 10px; display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 50%; font-size: 16px;
  }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name { font-size: 18px; font-weight: 800; color: white; letter-spacing: 0.5px; }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; margin-top: 2px; }

  .sb-nav { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .nav-group { margin-bottom: 20px; }
  .nav-sep-label {
    display: block; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.5);
    margin: 10px 0 10px 15px; text-transform: uppercase; letter-spacing: 1px;
  }

  .nav-link {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 15px; color: rgba(255,255,255,0.75);
    text-decoration: none; font-weight: 700; font-size: 13px;
    border-radius: var(--radius-md); transition: 0.2s ease;
  }
  .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
  .nav-link.active {
    background-color: var(--sidebar-active);
    color: white;
  }
  .n-ico { font-size: 16px; opacity: 0.9; }

  .sb-bottom { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
  .logout-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px; color: white; background: rgba(255,255,255,0.1);
    text-decoration: none; font-weight: 700; font-size: 13px;
    border-radius: var(--radius-md); transition: 0.2s ease;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.2); }

  /* ══════════════════ MAIN CONTENT ══════════════════ */
  .main-wrapper {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  .topbar {
    background: var(--header-bg); padding: 15px 40px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border-light);
    z-index: 5;
  }
  .pg-title { font-size: 24px; font-weight: 600; color: var(--text-dark); }

  .topbar-r { display: flex; align-items: center; gap: 20px; }

  /* Topbar Search with HTML5 Validation Styling */
  .search-form {
    display: flex; align-items: center;
    border: 1px solid var(--border-light); border-radius: var(--radius-md);
    overflow: hidden; background: var(--bg-body);
  }
  .search-form input {
    border: none; background: transparent; padding: 10px 15px; width: 260px;
    font-size: 13px; font-family: var(--font-main); color: var(--text-dark); outline: none;
  }
  /* Basic HTML5 Validation visual cue */
  .search-form input:focus:invalid { box-shadow: inset 0 0 0 1px #EB5757; }
  .search-form input:focus:valid { box-shadow: inset 0 0 0 1px var(--primary-blue); }
  .search-form button {
    background: var(--primary-blue); border: none; color: white;
    padding: 0 15px; height: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
  }
  .search-form button:hover { background: #264ac2; }

  .theme-btn {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    background: transparent; padding: 5px; border-radius: 30px;
    font-size: 13px; font-weight: 600; color: var(--text-dark);
  }
  .tgl { width: 34px; height: 20px; background: #D1D5DB; border-radius: 12px; position: relative; transition: 0.3s; }
  .tgl-k { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
  [data-theme="dark"] .tgl { background: var(--primary-blue); }
  [data-theme="dark"] .tgl-k { left: 17px; }

  .main-scroll {
    flex: 1; padding: 25px 40px 60px; overflow-y: auto;
  }

  .tabs { display: flex; border-bottom: 2px solid var(--border-light); margin-bottom: 30px; }
  .tab {
    padding: 0 0 10px 0; margin-right: 30px; font-size: 12px; font-weight: 800;
    color: var(--text-muted); cursor: pointer; text-transform: uppercase;
    position: relative; top: 2px;
  }
  .tab.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); }

  /* Layout wrappers to align with picture exactly */
  .stat-row { display: flex; gap: 25px; margin-bottom: 35px; }
  .stat-card {
    flex: 1; background: var(--card-bg); padding: 25px 30px;
    border-radius: var(--radius-md); border-left: 5px solid var(--primary-blue);
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }
  .s-lbl { font-size: 11px; color: var(--primary-blue); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .s-val { font-size: 32px; font-weight: 800; color: var(--text-dark); }

  /* Section Headers */
  .section-title {
    font-size: 18px; font-weight: 800; color: var(--text-dark);
    margin: 10px 0 20px 0;
  }
  .section-title.primary-colored { color: var(--primary-blue); }

  /* Grid matching image */
  .bank-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px; margin-bottom: 40px;
  }

  /* Bank Cards */
  .bank-card {
    background: var(--card-bg); border-radius: var(--radius-md); padding: 25px 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02); display: flex; flex-direction: column;
    border: 1px solid var(--border-light);
  }
  .bk-name { font-size: 16px; font-weight: 800; color: var(--primary-blue); margin-bottom: 4px; }
  .bk-loc { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: lowercase; margin-bottom: 20px; }

  .bk-divider { border-top: 1px solid var(--border-light); margin: 0 -30px 20px; }

  .bk-stats { display: flex; gap: 40px; }
  .bk-sl { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
  .bk-sv { font-size: 22px; color: var(--text-dark); font-weight: 800; }

  /* Register Bank dashed card */
  .bank-card.add-bank {
    background: transparent; border: 2px dashed #D1D5DB; box-shadow: none;
    justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
  }
  .bank-card.add-bank:hover { border-color: var(--primary-blue); background: rgba(49, 88, 211, 0.02); }
  .add-icon { font-size: 24px; color: var(--text-muted); margin-bottom: 10px; font-weight: 300; }
  .add-text { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

  /* Tables styling matching image */
  .table-wrap {
    background: var(--card-bg); border-radius: var(--radius-md);
    box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid var(--border-light);
    margin-bottom: 40px; overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th {
    padding: 16px 25px; font-size: 10px; font-weight: 800; color: var(--text-muted);
    text-transform: uppercase; border-bottom: 1px solid var(--border-light);
  }
  td {
    padding: 18px 25px; font-size: 13px; font-weight: 700; color: var(--text-dark);
    border-bottom: 1px solid var(--border-light); vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }

  .u-name { font-weight: 800; color: var(--text-dark); }
  .u-sub { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

  /* Additional Badges */
  .badge { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
  .b-green { background: var(--badge-green-bg); color: var(--badge-green-text); }
  .b-amber { background: var(--badge-orange-bg); color: var(--badge-orange-text); }
  .b-red { background: var(--badge-red-bg); color: var(--badge-red-text); }

</style>
</head>
<body>

<!-- ══════════════════ SIDEBAR ══════════════════ -->

    <div class="brand-icon">🏦</div>
    <div class="brand-text">
      <div class="brand-name">TRUSTIFY</div>

    </div>
  </div>

  <nav class="sb-nav">
    <div class="nav-group">
      <a class="nav-link active" href="/admin_home">
        <span class="n-ico">⊞</span>
        <span class="nav-link-text">Dashboard</span>
      </a>
    </div>

    <div class="nav-group">
      <span class="nav-sep-label">Manage</span>
      <a class="nav-link" href="/admin_manage_bank">
        <span class="n-ico">🏦</span>

      </a>
      <a class="nav-link" href="/admin_view_user">

  </nav>

  <div class="sb-bottom">
    <a href="/logout_view" class="logout-btn">
      <span class="n-ico">🚪</span>
